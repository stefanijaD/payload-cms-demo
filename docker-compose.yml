services:
  postgres:
    image: postgres:16
    container_name: payload-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: payload
      POSTGRES_USER: payload
      POSTGRES_PASSWORD: payload
    volumes:
      - payload-postgres-data:/var/lib/postgresql/data

volumes:
  payload-postgres-data: